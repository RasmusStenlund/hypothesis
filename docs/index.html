<!DOCTYPE html>

<html>
<head>
    <meta charset = "UTF-8">
    <meta name = "viewport" content = "width = device-width, initial-scale = 1">
    <link rel = "stylesheet" href = "style.css">
    <link rel = "stylesheet" href = "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel = "icon" type = "image/png" href = "images/hypothesis-icon-web.png">
    <title>Hypothesis</title>
</head>

<body>
    <div class = "header" id = "nav-bar">
        <div class = "logo">
            <a href = "#/">
                <img src = "./images/hypothesis-icon.png" class = "icon" alt = "Hypothesis icon">
                <p id = "logo-text">Hypothesis</p>
            </a>
        </div>

        <div id = "public-links" class = "links">
            <a href = "#/account/signin">Sign in</a>
            <a href = "#/account/signup">Sign up</a>
        </div>

        <div id = "private-links" class = "links hidden">
            <a href = "#/experiments">Experiments</a>
            <a href = "#/experiments/new">+ New experiment</a>
            <a href = "#/account">Account</a>
        </div>

        <a href="javascript:void(0);" id = "menu-button">
            <i id = "menu-icon" class="fa-solid fa-bars"></i>
        </a>
    </div>

    <div id = "side-menu"></div>

    <div id = "message-overlay">
        <p class = "message"></p>
    </div>

    <div id = "app"></div>

    <script type = "module" src = "script.js"></script>
</body>

</html>
